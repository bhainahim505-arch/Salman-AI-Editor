name: Build Android APK 🦾📱🚀

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: |
          yes | "$ANDROID_HOME"/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Check Web Assets
        run: |
          if [ ! -d "dist" ]; then
            echo "dist folder missing! Creating dummy..."
            mkdir -p dist
            echo "<html><body>Salman Edit Z</body></html>" > dist/index.html
          fi
          ls -R dist

      - name: Prepare Capacitor Android
        run: |
          # Nuclear Option: Force recreate android platform to avoid sync issues
          rm -rf android
          npx cap add android
          npx cap sync
          npx cap copy android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Salman-Edit-Z-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
